<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>不達メール管理</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f3f6fa}*{box-sizing:border-box}body{margin:0}.wrap{max-width:1280px;margin:auto;padding:18px}.head,.card{background:#fff;border-radius:16px;box-shadow:0 5px 22px #18314d14;padding:18px;margin-bottom:14px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.headLinks{display:flex;gap:8px;flex-wrap:wrap}h1{font-size:1.45rem;margin:0}.back,.btn{border:0;border-radius:10px;padding:9px 12px;cursor:pointer;text-decoration:none;background:#e8eef6;color:#18314d}.btn.primary{background:#1769aa;color:#fff}.btn.danger{background:#b42318;color:#fff}.btn.warn{background:#a15c00;color:#fff}.btn.archive{background:#5b6472;color:#fff}.notice{padding:12px;border-left:4px solid #d58b00;background:#fff8e6;line-height:1.6}.filters{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:10px}.filters input,.filters select{width:100%;padding:10px;border:1px solid #ccd6e0;border-radius:9px}.checks{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.tableWrap{overflow:auto}table{border-collapse:collapse;width:100%;min-width:1050px}th,td{padding:10px;border-bottom:1px solid #e4e9ef;text-align:left;vertical-align:top;font-size:.9rem}th{background:#f7f9fc;position:sticky;top:0}.badge{display:inline-block;padding:3px 8px;border-radius:20px;background:#e8eef6}.archiveBadge{background:#5b6472;color:#fff}.stopped{color:#b42318;font-weight:700}.actions{display:flex;gap:5px;flex-wrap:wrap}.empty{text-align:center;padding:35px;color:#687588}.mobileCards{display:none}.failureCard{background:#fff;border:1px solid #dce4ed;border-radius:14px;padding:14px;margin-bottom:12px}.failureCard.archived{border-color:#8b95a5;background:#f7f8fa}.failureCard dl{display:grid;grid-template-columns:100px 1fr;gap:7px;margin:0 0 12px}.failureCard dt{font-weight:700;color:#536174}.failureCard dd{margin:0;overflow-wrap:anywhere}.failureCard .actions{display:grid;grid-template-columns:repeat(2,minmax(100px,1fr));gap:8px}.failureCard .btn{min-width:100px;white-space:nowrap}dialog{border:0;border-radius:15px;max-width:780px;width:calc(100% - 28px);max-height:88vh;overflow:auto;padding:22px}dialog::backdrop{background:#10182899}.detailGrid{display:grid;grid-template-columns:150px 1fr;gap:8px}.raw{white-space:pre-wrap;overflow-wrap:anywhere;background:#101828;color:#e7edf6;padding:12px;border-radius:9px;max-height:300px;overflow:auto}.spamBox{background:#fff1f0;padding:12px;border-radius:10px}.spamBox textarea{width:100%;min-height:85px}.msg{padding:10px;margin:10px 0;border-radius:8px;background:#eaf5ff}.error{background:#fff0f0;color:#a00}.summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.summaryItem{padding:8px 12px;border-radius:10px;background:#f4f7fb;font-weight:700}.summaryItem.alert{background:#fff0f0;color:#b42318}.countBadge{display:none;min-width:24px;height:24px;padding:2px 7px;border-radius:999px;background:#d92d20;color:#fff;text-align:center;font-weight:800;margin-left:7px}
@media(max-width:760px){.wrap{padding:9px}.head{align-items:flex-start;flex-direction:column}.filters{grid-template-columns:1fr 1fr}.detailGrid{grid-template-columns:1fr}.filters .wide{grid-column:1/-1}h1{font-size:1.2rem}.tableWrap{display:none}.mobileCards{display:block}.actions .btn{min-height:42px}.notice{font-size:.9rem}}
</style></head><body><main class="wrap">
<section class="head"><div><h1>不達メール管理 <span id="headerBadge" class="countBadge"></span></h1><div id="staff"></div></div><div class="headLinks"><a class="back" href="archive_delivery_failures.html">非表示データの管理</a><a class="back" href="index.html">← スタッフ用アプリ</a></div></section>
<section class="notice">「配信済み」は受信サーバーまで届いたことを示します。<br>迷惑メールフォルダへの振り分けや、保護者が実際に閲覧したことを保証するものではありません。</section>
<section class="card"><div class="filters">
<input id="email" placeholder="メールアドレス検索"><input id="student" placeholder="生徒番号・氏名検索"><input id="school" placeholder="校舎">
<label>送信元<select id="source"><option value="">すべて</option><option value="QR_ATTENDANCE">出退くんQR</option><option value="STEP_MESSAGE_CENTER">STEP配信</option></select></label>
<select id="event"><option value="">全イベント</option><option value="hard_bounce">hard_bounce</option><option value="soft_bounce">soft_bounce</option><option value="deferred">deferred</option><option value="blocked">blocked</option><option value="invalid_email">invalid_email</option><option value="spam">spam</option><option value="error">error</option></select>
<select id="state"><option value="">全状態</option><option>一時エラー</option><option>恒久不達</option><option>ブロック</option><option>無効アドレス</option><option>迷惑メール報告</option><option>送信エラー</option></select>
<select id="confirmStatus"><option value="">全確認状態</option><option value="未確認">未確認</option><option value="確認済み">確認済み</option></select>
<div class="checks wide"><label><input id="unconfirmed" type="checkbox"> 未確認のみ</label><label><input id="stopped" type="checkbox"> 送信停止中のみ</label><label><input id="includeArchived" type="checkbox"> 非表示を含める</label></div>
<button class="btn primary" onclick="loadItems()">検索・更新</button></div><div id="message"></div><div class="summary"><div class="summaryItem alert">未確認 <span id="count">0</span>件</div><div class="summaryItem">送信停止中 <span id="stoppedCount">0</span>件</div><div class="summaryItem">本日発生 <span id="todayCount">0</span>件</div></div></section>
<section class="card tableWrap"><table><thead><tr><th>メールアドレス</th><th>発生時刻</th><th>理由</th><th>生徒氏名</th><th>校舎</th><th>送信元</th><th>メール区分</th><th>状態</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></section>
<section id="cards" class="mobileCards"></section>
</main>
<dialog id="detail"><button class="back" onclick="detail.close()">閉じる</button><h2>不達メール詳細</h2><div id="detailBody"></div></dialog>
<script>
const API='https://script.google.com/macros/s/AKfycbw8L36Fj8SKtvNHQBi41FMqAPvDLGAdu1bbLxvd-78A8dFUOkWGnYRE-8PRNq7QZOl70w/exec';
const AUTH_KEY='stepStaffAppAuth';let auth=null,items=[];const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
document.addEventListener('DOMContentLoaded',()=>{try{auth=JSON.parse(localStorage.getItem(AUTH_KEY)||'null')}catch(e){}if(!auth?.code){location.href='index.html';return}$('staff').textContent=(auth.name||auth.code)+' さん';$('source').addEventListener('change',loadItems);loadItems()});
async function api(data){const body=Object.assign({},data,{staffCode:auth.code,staffPassword:auth.password||''});const res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body),redirect:'follow'});const out=await res.json();if(!out.ok)throw new Error(out.message||'処理に失敗しました');return out}
function msg(text,error){$('message').className='msg'+(error?' error':'');$('message').textContent=text||''}
async function loadItems(){try{msg('読み込み中…');const r=await api({action:'deliveryFailuresList',emailSearch:$('email').value,studentSearch:$('student').value,school:$('school').value,sourceSystem:$('source').value,event:$('event').value,state:$('state').value,confirmStatus:$('confirmStatus').value,unconfirmedOnly:$('unconfirmed').checked,stoppedOnly:$('stopped').checked,includeArchived:$('includeArchived').checked});items=Array.isArray(r.items)?r.items:[];renderSummary(r.summary||{});render();msg('')}catch(e){items=[];renderSummary({});render();msg(e.message,true)}}
function renderSummary(summary){const unconfirmed=Number(summary.unconfirmed)||0;$('count').textContent=unconfirmed;$('stoppedCount').textContent=Number(summary.stopped)||0;$('todayCount').textContent=Number(summary.today)||0;const badge=$('headerBadge');if(unconfirmed>0){badge.textContent=unconfirmed>99?'99+':String(unconfirmed);badge.style.display='inline-block'}else{badge.textContent='';badge.style.display='none'}}
function normalizeSource(v){return String(v||'').replace(/\u3000/g,'').trim().toUpperCase()}
function sourceLabel(v){v=normalizeSource(v);return v==='STEP_MESSAGE_CENTER'?'STEP配信':(v==='QR_ATTENDANCE'?'出退くんQR':'その他')}
function mailType(x){if(normalizeSource(x.sourceSystem)==='STEP_MESSAGE_CENTER')return x.subject||x.fields||x.mailType||'STEP配信';return x.mailType||((x.tags||'').includes('checkout')?'退室':'入室')}
function statusHtml(x){return `<span class="badge">${esc(x.state)}</span><br>${esc(x.confirmStatus)}${x.archived?'<br><span class="badge archiveBadge">アーカイブ済み</span>':''}`}
function actionHtml(x){return `<div class="actions"><button class="btn" onclick="confirmItem('${x.id}')">確認済み</button><button class="btn archive" onclick="archiveItem('${x.id}')">非表示</button><button class="btn primary" onclick="resume('${x.id}',false)">送信再開</button><button class="btn danger" onclick="stopItem('${x.id}')">再停止</button><button class="btn" onclick="showDetail('${x.id}')">詳細</button></div>`}
function render(){const rows=items.map(x=>`<tr><td>${esc(x.email)}${x.stopped?'<div class="stopped">送信停止中</div>':''}</td><td>${fmt(x.occurredAt)}</td><td>${esc(x.reason||'-')}<br><small>発生 ${x.occurrenceCount||1}回</small></td><td>${esc(x.studentNames||'-')}</td><td>${esc(x.school||'-')}</td><td>${esc(sourceLabel(x.sourceSystem))}</td><td>${esc(mailType(x))}</td><td>${statusHtml(x)}</td><td>${actionHtml(x)}</td></tr>`).join('');$('rows').innerHTML=rows||'<tr><td colspan="9" class="empty">該当する不達記録はありません</td></tr>';$('cards').innerHTML=items.length?items.map(x=>`<article class="failureCard${x.archived?' archived':''}"><dl><dt>メールアドレス</dt><dd>${esc(x.email)}${x.stopped?'（送信停止中）':''}</dd><dt>送信元</dt><dd>${esc(sourceLabel(x.sourceSystem))}</dd><dt>メール区分</dt><dd>${esc(mailType(x))}</dd><dt>発生時刻</dt><dd>${fmt(x.occurredAt)}</dd><dt>理由</dt><dd>${esc(x.reason||'-')}</dd><dt>状態</dt><dd>${esc(x.state)}・${esc(x.confirmStatus)}${x.archived?'・アーカイブ済み':''}</dd></dl>${actionHtml(x)}</article>`).join(''):'<div class="card empty">該当する不達記録はありません</div>'}
const fmt=v=>v?new Date(v).toLocaleString('ja-JP'):'-';
async function confirmItem(id){try{await api({action:'deliveryFailureConfirm',id});await loadItems()}catch(e){msg(e.message,true)}}
async function archiveItem(id){if(!confirm('この不達記録を通常一覧から非表示にしますか？'))return;try{await api({action:'deliveryFailureArchive',id});await loadItems()}catch(e){msg(e.message,true)}}
async function stopItem(id){if(!confirm('このメールアドレスを再び送信停止にしますか？'))return;try{await api({action:'deliveryFailureStop',id});await loadItems()}catch(e){msg(e.message,true)}}
async function resume(id){const x=items.find(v=>v.id===id);if(x?.event==='spam'){showDetail(id);return}if(!confirm('不達管理上の送信停止を解除しますか？ Brevo側でブロックされている場合はAK=4による別の解除が必要です。'))return;try{const r=await api({action:'deliveryFailureResume',id});if(r.brevoUnblockRequired)msg('ローカルの送信停止を解除しました。Brevo側のブロック解除はAK=4で別途実行してください。');await loadItems()}catch(e){msg(e.message,true)}}
async function showDetail(id){try{const r=await api({action:'deliveryFailureDetail',id});const x=r.item;let raw=x.rawJson;try{raw=JSON.stringify(JSON.parse(raw),null,2)}catch(e){}$('detailBody').innerHTML=`<div class="detailGrid"><b>メール</b><div>${esc(x.email)}</div><b>状態</b><div>${esc(x.state)} / ${x.stopped?'送信停止中':'送信可'}${x.archived?' / アーカイブ済み':''}</div><b>生徒</b><div>${esc(x.relatedStudents||'-').replace(/\n/g,'<br>')}</div><b>件名</b><div>${esc(x.subject||'-')}</div><b>理由</b><div>${esc(x.reason||'-')}</div><b>Message ID</b><div>${esc(x.messageId)}</div><b>照合ID</b><div>${esc(x.correlationId)}</div></div>${x.event==='spam'?`<div class="spamBox"><h3>迷惑メール報告の本人確認解除（AK=4のみ）</h3><label><input id="guardianConfirmed" type="checkbox"> 保護者本人へ確認済み</label><textarea id="confirmationDetails" placeholder="確認日時・確認方法・本人から得た同意内容を入力"></textarea><button class="btn warn" onclick="spamResume('${x.id}')">本人確認のうえ送信再開</button></div>`:''}<h3>Brevo元イベント</h3><div class="raw">${esc(raw)}</div>`;$('detail').showModal()}catch(e){msg(e.message,true)}}
async function spamResume(id){if(!$('guardianConfirmed').checked||!$('confirmationDetails').value.trim()){alert('本人確認済みのチェックと確認内容が必要です');return}if(!confirm('Brevoのspamブロックを解除して送信を再開しますか？'))return;try{await api({action:'deliveryFailureSpamResume',id,guardianConfirmed:true,confirmationDetails:$('confirmationDetails').value.trim()});$('detail').close();await loadItems()}catch(e){alert(e.message)}}
</script></body></html>
