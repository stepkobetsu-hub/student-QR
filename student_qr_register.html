<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest-qr.json">
<link rel="apple-touch-icon" href="icon-qr-192.png">
<meta name="theme-color" content="#2e7d5b">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒・講師QR／入退室管理 | Step個別指導ステップ</title>
<style>
  :root {
    --main-color: #2e7d5b;
    --bg-color: #f5f7f6;
    --border-color: #d8e0dc;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg-color);
    margin: 0;
    padding: 20px;
    color: #333;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .hidden { display: none !important; }
  .auth-card {
    max-width: 430px;
    margin: 8vh auto 0;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .auth-card h1 {
    font-size: 20px;
    margin-bottom: 6px;
  }
  .auth-note {
    font-size: 13px;
    color: #777;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 18px;
    color: var(--main-color);
    margin: 0 0 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    margin: 16px 0 6px;
    color: #555;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: #fafcfb;
  }
  input[type="text"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: var(--main-color);
  }
  .student-info {
    margin-top: 10px;
    padding: 10px 14px;
    background: #eef6f1;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .student-info.show { display: block; }
  .student-info .name {
    font-weight: bold;
    font-size: 16px;
    color: var(--main-color);
  }
  .qr-status {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: var(--main-color);
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled {
    background: #b8c7c0;
  }
  .msg {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .msg.success {
    background: #e6f4ea;
    color: #1e7e34;
    display: block;
  }
  .msg.error {
    background: #fdecea;
    color: #c0392b;
    display: block;
  }
  .history {
    margin-top: 24px;
    border-top: 1px solid var(--border-color);
    padding-top: 14px;
  }
  .history h2 {
    font-size: 13px;
    color: #888;
    margin: 0 0 8px;
  }
  .history-item {
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px dashed #eee;
    display: flex;
    justify-content: space-between;
  }
  .hint {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
    line-height: 1.5;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    margin: 0;
    font-size: 14px;
    font-weight: bold;
    color: var(--main-color);
    background: #eef6f1;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    cursor: pointer;
  }
  .tab-btn.active {
    color: #fff;
    background: var(--main-color);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .qr-card {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    text-align: center;
    background: #fff;
  }
  .qr-card.show { display: block; }
  .qr-card .school-name {
    font-size: 15px;
    color: #2a5da0;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .qr-card .card-code {
    font-size: 20px;
    color: #b5651d;
    font-weight: bold;
  }
  .qr-card .card-name {
    font-size: 16px;
    color: #2e7d5b;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .qr-card img {
    width: 160px;
    height: 160px;
    margin-top: 6px;
  }
  #printBtn {
    background: #6a4fa0;
  }
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .staff-badge {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
    margin-top: 2px;
  }
  .logout-btn {
    width: auto;
    margin: 0;
    padding: 8px 12px;
    font-size: 13px;
    background: #777;
  }

  #notifyEmail1:not(:placeholder-shown),
  #notifyEmail2:not(:placeholder-shown),
  #notifyEmail3:not(:placeholder-shown),
  #notifyEmail4:not(:placeholder-shown) {
    font-weight: bold;
    font-size: 19px;
    color: var(--main-color);
    background: #eef6f1;
    border-color: var(--main-color);
  }

  @media print {
    body * { visibility: hidden; }
    .qr-card, .qr-card * { visibility: visible; }
    .qr-card {
      position: absolute;
      top: 40px; left: 50%;
      transform: translateX(-50%);
      border: 1px solid #999;
    }
  }
  @media (max-width: 560px) {
    body { padding: 14px; }
    .container, .auth-card { padding: 18px; }
    .app-header {
      display: block;
    }
    .header-actions {
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tabs {
      flex-wrap: wrap;
    }
    .tab-btn {
      min-width: calc(50% - 4px);
    }
  }
</style>
</head>
<body>

<div class="auth-card" id="loginPanel">
  <h1>生徒・講師QR／入退室管理</h1>
  <div class="auth-note">権限を持つスタッフ専用ページです。</div>
  <form id="loginForm">
    <label for="loginId">ID</label>
    <input type="text" id="loginId" name="username" autocomplete="username" inputmode="numeric">
    <label for="loginPassword">パスワード</label>
    <input type="password" id="loginPassword" name="password" autocomplete="current-password">
    <button type="submit" id="loginBtn">ログイン</button>
    <div id="loginMsg" class="msg"></div>
  </form>
</div>

<div class="container hidden" id="appContainer">
  <div class="app-header">
    <div>
      <h1>生徒・講師QR／入退室管理</h1>
      <div class="subtitle">既存カードの登録・新規QRの発行ができます</div>
    </div>
    <div class="header-actions">
      <div class="staff-badge" id="loginStaffLabel"></div>
      <button type="button" class="logout-btn" onclick="logoutStudentQr()">ログアウト</button>
      <button type="button" onclick="toggleSettings()" style="width:auto; margin:0; padding:8px 14px; font-size:13px; background:#555;">⚙️ 設定</button>
    </div>
  </div>

  <div id="settingsPanel" style="display:none; margin:14px 0; padding:16px; background:#f5f7f6; border-radius:10px; border:1px solid var(--border-color);">
    <h2 style="font-size:14px; margin:0 0 10px;">①生徒・講師QR登録アプリ（このページ）</h2>
    <div style="font-size:12px; word-break:break-all; margin-bottom:8px;" id="settingsRegisterUrl"></div>
    <img id="settingsRegisterQr" src="" width="140" height="140">

    <h2 style="font-size:14px; margin:18px 0 10px;">②QR読み取りアプリ（タブレット用）</h2>
    <div style="font-size:12px; word-break:break-all; margin-bottom:8px;" id="settingsTabletUrl"></div>
    <img id="settingsTabletQr" src="" width="140" height="140">

    <div style="margin-top:18px;">
      <label for="settingsEmail">この情報をメールで送る</label>
      <input type="text" id="settingsEmail" placeholder="送信先メールアドレス" autocomplete="off">
      <button id="settingsSendBtn" onclick="sendAppLinksEmail()" style="background:#2a8f7a;">📧 メールで送信</button>
      <div id="settingsMsg" class="msg"></div>
    </div>
  </div>

  <div class="tabs">
    <button type="button" class="tab-btn active" id="tabExistingBtn" onclick="switchTab('existing')">既存QR登録</button>
    <button type="button" class="tab-btn" id="tabCheckBtn" onclick="switchTab('check')">QR確認</button>
    <button type="button" class="tab-btn" id="tabNewBtn" onclick="switchTab('new')">新規QR発行</button>
    <button type="button" class="tab-btn" id="tabEmailBtn" onclick="switchTab('email')">通知先メール</button>
    <button type="button" class="tab-btn" id="tabPointsBtn" onclick="switchTab('points')">ポイント付与</button>
    <button type="button" class="tab-btn" id="tabCsvBtn" onclick="switchTab('csv')">勤怠CSV出力</button>
  </div>

  <!-- ① 既存の入退くんQRを登録するパネル -->
  <div class="tab-panel active" id="panelExisting">
    <label for="studentCode">① 生徒・講師番号</label>
    <input type="text" id="studentCode" placeholder="例: 1001" inputmode="numeric" autocomplete="off">
    <div id="studentInfo" class="student-info">
      <div class="name" id="studentName"></div>
      <div id="studentSchool"></div>
      <div class="qr-status" id="qrStatus"></div>
    </div>

    <label for="qrData">② QRコードの中身</label>
    <input type="text" id="qrData" placeholder="下のボタンでカメラ起動、または手入力" autocomplete="off">
    <div class="hint">手入力も可能です。</div>

    <button id="scanBtn" type="button" onclick="toggleScanner()" style="background:#3b6ea5;">📷 カメラでQRをスキャン</button>
    <div id="readerWrap" style="display:none; margin-top:14px;">
      <div id="reader" style="width:100%; border-radius:8px; overflow:hidden;"></div>
    </div>

    <button id="saveBtn" onclick="saveQr()">登録する</button>

    <div id="msg" class="msg"></div>

    <div class="history">
      <h2>今回のセッションで登録した生徒</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- ② 現在登録されているQRを確認するパネル -->
  <div class="tab-panel" id="panelCheck">
    <label for="checkStudentCode">生徒・講師番号</label>
    <input type="text" id="checkStudentCode" placeholder="例: 1001" inputmode="numeric" autocomplete="off">
    <div id="checkStudentInfo" class="student-info">
      <div class="name" id="checkStudentName"></div>
      <div id="checkStudentSchool"></div>
    </div>

    <div class="qr-card" id="checkQrCard">
      <div class="school-name">個別指導ステップ</div>
      <div class="card-code" id="checkCardCode"></div>
      <div class="card-name" id="checkCardName"></div>
      <img id="checkCardQrImg" src="" alt="QRコード">
    </div>

    <button id="checkPrintBtn" style="display:none;" onclick="window.print()">🖨 このカードを印刷する</button>

    <div id="checkPdfEmailWrap" style="display:none; margin-top:16px;">
      <label for="checkPdfEmail">このQRをPDFでメール送信</label>
      <input type="text" id="checkPdfEmail" placeholder="送信先メールアドレス" autocomplete="off">
      <button id="checkSendPdfBtn" onclick="sendCheckQrPdf()" style="background:#2a8f7a;">📧 PDFをメールで送る</button>
      <div id="checkPdfMsg" class="msg"></div>
    </div>
  </div>

  <!-- ② 新規生徒のQRを発行するパネル -->
  <div class="tab-panel" id="panelNew">
    <label for="newStudentCode">生徒・講師番号</label>
    <input type="text" id="newStudentCode" placeholder="例: 1250" inputmode="numeric" autocomplete="off">
    <div id="newStudentInfo" class="student-info">
      <div class="name" id="newStudentName"></div>
      <div id="newStudentSchool"></div>
    </div>

    <button id="issueBtn" onclick="issueQr()" style="background:#b5651d;">🆕 QRを発行する</button>

    <div id="newMsg" class="msg"></div>

    <div class="qr-card" id="qrCard">
      <div class="school-name">個別指導ステップ</div>
      <div class="card-code" id="cardCode"></div>
      <div class="card-name" id="cardName"></div>
      <img id="cardQrImg" src="" alt="QRコード">
    </div>

    <button id="printBtn" style="display:none;" onclick="window.print()">🖨 このカードを印刷する</button>

    <div id="pdfEmailWrap" style="display:none; margin-top:16px;">
      <label for="pdfEmail">このQRをPDFでメール送信</label>
      <input type="text" id="pdfEmail" placeholder="送信先メールアドレス" autocomplete="off">
      <button id="sendPdfBtn" onclick="sendQrPdf()" style="background:#2a8f7a;">📧 PDFをメールで送る</button>
      <div id="pdfMsg" class="msg"></div>
    </div>
  </div>

  <!-- ③ 通知先メールを登録するパネル -->
  <div class="tab-panel" id="panelEmail">
    <label for="emailStudentCode">生徒・講師番号</label>
    <input type="text" id="emailStudentCode" placeholder="例: 1001" inputmode="numeric" autocomplete="off">
    <div id="emailStudentInfo" class="student-info">
      <div class="name" id="emailStudentName"></div>
    </div>

    <div class="hint" style="margin-top:14px;">
      チェックが入っているメールにだけ配信されます。①は保護者メール（X列）と共通です。
    </div>

    <label for="notifyEmail1">通知先メール ①（保護者メール／X列）</label>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="notifyEnabled1" checked style="width:20px; height:20px; flex-shrink:0;">
      <input type="text" id="notifyEmail1" placeholder="例: parent1@example.com" autocomplete="off" style="flex:1;">
    </div>

    <label for="notifyEmail2">通知先メール ②（BA列）</label>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="notifyEnabled2" checked style="width:20px; height:20px; flex-shrink:0;">
      <input type="text" id="notifyEmail2" placeholder="任意" autocomplete="off" style="flex:1;">
    </div>

    <label for="notifyEmail3">通知先メール ③（BB列）</label>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="notifyEnabled3" checked style="width:20px; height:20px; flex-shrink:0;">
      <input type="text" id="notifyEmail3" placeholder="任意" autocomplete="off" style="flex:1;">
    </div>

    <label for="notifyEmail4">通知先メール ④（BC列）</label>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="notifyEnabled4" checked style="width:20px; height:20px; flex-shrink:0;">
      <input type="text" id="notifyEmail4" placeholder="任意" autocomplete="off" style="flex:1;">
    </div>

    <button id="saveEmailBtn" onclick="saveNotifyEmails()" style="background:#c0392b;">通知先メールを保存する</button>

    <div id="emailMsg" class="msg"></div>
  </div>

  <!-- ④ ポイントを手動付与するパネル -->
  <div class="tab-panel" id="panelPoints">
    <label for="pointsStudentCode">生徒・講師番号</label>
    <input type="text" id="pointsStudentCode" placeholder="例: 1001" inputmode="numeric" autocomplete="off">
    <div id="pointsStudentInfo" class="student-info">
      <div class="name" id="pointsStudentName"></div>
      <div id="pointsCurrentTotal"></div>
    </div>

    <label for="pointsValue">付与するポイント数</label>
    <input type="text" id="pointsValue" placeholder="例: 5（訂正の場合はマイナスも可: -3）" inputmode="numeric" autocomplete="off">

    <label for="pointsReason">理由（任意）</label>
    <input type="text" id="pointsReason" placeholder="例: 期末テスト高得点" autocomplete="off">

    <button id="savePointsBtn" onclick="addPoints()" style="background:#e08e0b;">⭐ ポイントを付与する</button>

    <div id="pointsMsg" class="msg"></div>

    <div class="history">
      <h2>ポイント履歴（新しい順・最大20件）</h2>
      <div id="pointsHistoryList"></div>
    </div>
  </div>

  <!-- ⑥ 講師勤怠CSV出力パネル -->
  <div class="tab-panel" id="panelCsv">
    <label for="csvStartDate">開始日</label>
    <input type="date" id="csvStartDate">
    <label for="csvEndDate">終了日</label>
    <input type="date" id="csvEndDate">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
      <label style="margin:0;">対象講師（未選択の場合は全員）</label>
      <div>
        <button type="button" onclick="toggleAllTeachers(true)" style="width:auto; margin:0 4px; padding:6px 10px; font-size:12px; background:#888;">全選択</button>
        <button type="button" onclick="toggleAllTeachers(false)" style="width:auto; margin:0; padding:6px 10px; font-size:12px; background:#888;">全解除</button>
      </div>
    </div>
    <div id="teacherCheckList" style="max-height:260px; overflow-y:auto; border:1px solid var(--border-color); border-radius:8px; padding:10px; margin-top:8px; background:#fafcfb;">
      <div class="hint">読み込み中...</div>
    </div>

    <button id="csvExportBtn" onclick="exportAttendanceCsv()" style="background:#3b6ea5; margin-top:16px;">📄 CSVを出力する</button>

    <div id="csvMsg" class="msg"></div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ここをGASのウェブアプリURL（/exec で終わるもの）に書き換えてください
const API_URL = "https://script.google.com/macros/s/AKfycbzYpm-16ahuZ3BRFKRT-iSvR9nThsYcTOhxplyBp4bZmVmehfTYZEEl18THzJasypOsTQ/exec";
const AUTH_API_URL = "https://script.google.com/macros/s/AKfycbypkUc0MqZ07E7pZRglNPeRM56WbCcuWaLpRzi9bVFcPklHDxaaLC7GfzG6ozTGCbEX/exec";
const LOGIN_ID_KEY = 'studentQrLoginId';
const LOGIN_NAME_KEY = 'studentQrLoginName';
const PERMISSION_KEY = 'studentQrPermissionLevel';
const SESSION_TOKEN_KEY = 'studentQrSessionToken';
const SESSION_EXPIRES_KEY = 'studentQrSessionExpiresAt';
const QR_ALLOWED_PERMISSION_LEVELS = ['2', '3', '4'];

let studentQrAuth = null;

document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  loginStudentQr();
});

document.addEventListener('DOMContentLoaded', initStudentQrAuth);

async function authApi(payload) {
  const res = await fetch(AUTH_API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

function getSavedStudentQrAuth() {
  const loginId = localStorage.getItem(LOGIN_ID_KEY) || '';
  const name = localStorage.getItem(LOGIN_NAME_KEY) || '';
  const permissionLevel = localStorage.getItem(PERMISSION_KEY) || '';
  const sessionToken = localStorage.getItem(SESSION_TOKEN_KEY) || '';
  const expiresAt = localStorage.getItem(SESSION_EXPIRES_KEY) || '';
  if (!loginId || !sessionToken || !expiresAt) return null;
  return { loginId, name, permissionLevel, sessionToken, expiresAt };
}

function saveStudentQrAuth(auth) {
  localStorage.setItem(LOGIN_ID_KEY, auth.loginId || auth.code || '');
  localStorage.setItem(LOGIN_NAME_KEY, auth.name || '');
  localStorage.setItem(PERMISSION_KEY, String(auth.permissionLevel || ''));
  localStorage.setItem(SESSION_TOKEN_KEY, auth.sessionToken || '');
  localStorage.setItem(SESSION_EXPIRES_KEY, auth.expiresAt || '');
}

function clearStudentQrAuth() {
  localStorage.removeItem(LOGIN_ID_KEY);
  localStorage.removeItem(LOGIN_NAME_KEY);
  localStorage.removeItem(PERMISSION_KEY);
  localStorage.removeItem(SESSION_TOKEN_KEY);
  localStorage.removeItem(SESSION_EXPIRES_KEY);
  studentQrAuth = null;
}

function showLoginPanel(message) {
  document.getElementById('appContainer').classList.add('hidden');
  document.getElementById('loginPanel').classList.remove('hidden');
  if (message) showLoginMsg(message, 'error');
}

function showAppPanel(auth) {
  studentQrAuth = auth;
  document.getElementById('loginPanel').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  document.getElementById('loginStaffLabel').textContent =
    (auth.name || auth.loginId || '') + (auth.permissionLevel ? ' / 権限' + auth.permissionLevel : '');
  showLoginMsg('', '');
}

function showLoginMsg(text, type) {
  const el = document.getElementById('loginMsg');
  el.textContent = text || '';
  el.className = text ? 'msg ' + type : 'msg';
}

async function initStudentQrAuth() {
  const saved = getSavedStudentQrAuth();
  if (saved?.loginId) document.getElementById('loginId').value = saved.loginId;
  if (!saved || new Date(saved.expiresAt).getTime() <= Date.now()) {
    clearStudentQrAuth();
    showLoginPanel();
    return;
  }

  showLoginMsg('ログイン状態を確認しています...', 'success');
  try {
    const result = await authApi({ action: 'studentQrVerify', sessionToken: saved.sessionToken });
    if (!result.success || !QR_ALLOWED_PERMISSION_LEVELS.includes(String(result.permissionLevel || '').trim())) {
      clearStudentQrAuth();
      showLoginPanel(result.error || 'この機能を利用する権限がありません。管理者へ確認してください。');
      return;
    }
    const auth = {
      loginId: result.loginId || saved.loginId,
      name: result.name || saved.name || '',
      permissionLevel: String(result.permissionLevel || '').trim(),
      sessionToken: result.sessionToken || saved.sessionToken,
      expiresAt: result.expiresAt || saved.expiresAt
    };
    saveStudentQrAuth(auth);

  } catch (e) {

async function loginStudentQr() {
  const loginId = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  if (!loginId) {
    showLoginMsg('IDを入力してください。', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = '確認中...';
  showLoginMsg('確認しています...', 'success');
  try {
    const result = await authApi({ action: 'studentQrLogin', code: loginId, password });
    const permissionLevel = String(result.permissionLevel || '').trim();
    if (!result.success || !QR_ALLOWED_PERMISSION_LEVELS.includes(permissionLevel)) {
      clearStudentQrAuth();
      showLoginMsg('ID、パスワード、または利用権限を確認してください。', 'error');
      return;
    }
    const auth = {
      loginId: result.loginId || result.code || loginId,
      name: result.name || '',
      permissionLevel,
      sessionToken: result.sessionToken || '',
      expiresAt: result.expiresAt || ''
    };
    saveStudentQrAuth(auth);
    document.getElementById('loginPassword').value = '';
    showAppPanel(auth);
  } catch (e) {
    showLoginMsg('通信エラーが発生しました。もう一度お試しください。', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

async function requireStudentQrAuth() {
  const saved = studentQrAuth || getSavedStudentQrAuth();
  if (!saved || !saved.sessionToken || new Date(saved.expiresAt).getTime() <= Date.now()) {
    clearStudentQrAuth();
    showLoginPanel('ログインしてください。');
    throw new Error('ログインしてください。');
  }
  const result = await authApi({ action: 'studentQrVerify', sessionToken: saved.sessionToken });
  const permissionLevel = String(result.permissionLevel || '').trim();
  if (!result.success || !QR_ALLOWED_PERMISSION_LEVELS.includes(permissionLevel)) {
    clearStudentQrAuth();
    showLoginPanel(result.error || 'この機能を利用する権限がありません。管理者へ確認してください。');
    throw new Error(result.error || '権限がありません。');
  }
  const auth = {
    loginId: result.loginId || saved.loginId,
    name: result.name || saved.name || '',
    permissionLevel,
    sessionToken: result.sessionToken || saved.sessionToken,
    expiresAt: result.expiresAt || saved.expiresAt
  };
  saveStudentQrAuth(auth);
  studentQrAuth = auth;
  return auth;
}

function getStudentQrAuthParams() {
  const saved = studentQrAuth || getSavedStudentQrAuth() || {};
  return {
    staffLoginId: saved.loginId || '',
    sessionToken: saved.sessionToken || ''
  };
}

async function authorizedJsonp(params) {
  await requireStudentQrAuth();
  return jsonp(params);
}

async function logoutStudentQr() {
  const saved = getSavedStudentQrAuth();
  try {
    if (saved?.sessionToken) {
      await authApi({ action: 'studentQrLogout', sessionToken: saved.sessionToken });
    }
  } catch (e) {
    // ローカルのログアウトは必ず実行する
  }
  clearStudentQrAuth();
  if (scanning) await stopScanner();
  document.getElementById('loginPassword').value = '';
  showLoginPanel();
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    window[cb] = (data) => {
      resolve(data);
      delete window[cb];
      script.remove();
    };
    const query = new URLSearchParams({ ...params, ...getStudentQrAuthParams(), callback: cb }).toString();
    script.src = API_URL + "?" + query;
    script.onerror = () => reject(new Error("通信エラーが発生しました"));
    document.body.appendChild(script);
  });
}

let html5QrCode = null;
let scanning = false;

async function toggleScanner() {
  const wrap = document.getElementById('readerWrap');
  const btn = document.getElementById('scanBtn');

  if (scanning) {
    await stopScanner();
    return;
  }

  wrap.style.display = 'block';
  btn.textContent = '■ スキャンを停止';
  scanning = true;

  html5QrCode = new Html5Qrcode("reader");
  try {
    await html5QrCode.start(
      { facingMode: "environment" }, // 背面カメラ優先
      { fps: 10, qrbox: { width: 240, height: 240 } },
      (decodedText) => {
        // 読み取り成功
        qrDataEl.value = decodedText;
        stopScanner();
        showMsg('QRコードを読み取りました。内容を確認して「登録する」を押してください。', 'success');
      },
      (errorMessage) => {
        // 読み取り中のフレームごとのエラーは無視（QRが写っていないだけ）
      }
    );
  } catch (err) {
    showMsg('カメラを起動できませんでした。ブラウザのカメラ権限を確認してください。', 'error');
    scanning = false;
    btn.textContent = '📷 カメラでQRをスキャン';
    wrap.style.display = 'none';
  }
}

async function stopScanner() {
  const wrap = document.getElementById('readerWrap');
  const btn = document.getElementById('scanBtn');
  if (html5QrCode && scanning) {
    try {
      await html5QrCode.stop();
      html5QrCode.clear();
    } catch (e) {
      // 既に停止している場合は無視
    }
  }
  scanning = false;
  btn.textContent = '📷 カメラでQRをスキャン';
  wrap.style.display = 'none';
}

// 画像URLを読み込んでBase64（DataURL）に変換する
function loadImageAsDataUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width;
      c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = reject;
    img.src = url;
  });
}

      })
    });
    const data = await res.json();

    if (data.ok) {
      pdfMsgEl.textContent = `${data.name} さんのQR PDFを ${email} に送信しました。`;
      pdfMsgEl.className = 'msg success';
    } else {
      pdfMsgEl.textContent = data.message || '送信に失敗しました。';
      pdfMsgEl.className = 'msg error';
    }
  } catch (e) {
    pdfMsgEl.textContent = 'PDF作成または送信中にエラーが発生しました。';
    pdfMsgEl.className = 'msg error';
  } finally {
    btn.disabled = false;
    btn.textContent = '📧 PDFをメールで送る';
  }
}


// ===================================================================
// 通知先メール登録
// ===================================================================
const emailStudentCodeEl = document.getElementById('emailStudentCode');
const emailStudentInfoEl = document.getElementById('emailStudentInfo');
const emailStudentNameEl = document.getElementById('emailStudentName');
const emailMsgEl = document.getElementById('emailMsg');
const notifyEmailEls = [1, 2, 3, 4].map(n => document.getElementById('notifyEmail' + n));
const notifyEnabledEls = [1, 2, 3, 4].map(n => document.getElementById('notifyEnabled' + n));

let emailLookupTimer = null;
let emailLookupSeq = 0;
emailStudentCodeEl.addEventListener('input', () => {
  clearTimeout(emailLookupTimer);
  const code = emailStudentCodeEl.value.trim();
  emailStudentInfoEl.classList.remove('show');
  notifyEmailEls.forEach(el => el.value = '');
  notifyEnabledEls.forEach(el => el.checked = true);
  if (!code) return;

  const seq = ++emailLookupSeq;
  emailLookupTimer = setTimeout(async () => {
    try {
      const res = await authorizedJsonp({ action: 'getNotifyEmails', code });
      if (seq !== emailLookupSeq) return; // 古いリクエストの結果は無視
      if (res.ok) {
        emailStudentNameEl.textContent = res.name || '(氏名なし)';
        res.emails.forEach((v, i) => {
          if (notifyEmailEls[i]) notifyEmailEls[i].value = v || '';
        });
        res.enabled.forEach((v, i) => {
          if (notifyEnabledEls[i]) notifyEnabledEls[i].checked = (v !== false);
        });
      } else {
        emailStudentNameEl.textContent = res.message;
      }
      emailStudentInfoEl.classList.add('show');
    } catch (e) {
      // 通信中は何もしない
    }
  }, 400);
});

function showEmailMsg(text, type) {
  emailMsgEl.textContent = text;
  emailMsgEl.className = 'msg ' + type;
}

async function saveNotifyEmails() {
  const code = emailStudentCodeEl.value.trim();
  if (!code) {
    showEmailMsg('生徒・講師番号を入力してください。', 'error');
    return;
  }

  const emails = notifyEmailEls.map(el => el.value.trim());
  const enabled = notifyEnabledEls.map(el => el.checked);

  // 簡易的なメール形式チェック（空欄はOK）
  const invalid = emails.find(v => v !== '' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v));
  if (invalid) {
    showEmailMsg(`メールアドレスの形式が正しくありません: ${invalid}`, 'error');
    return;
  }

  // 重複アドレスの警告（保存はできるが、実際の送信では自動的に1件にまとめられる旨を伝える）
  const nonEmpty = emails.filter(v => v !== '');
  const lower = nonEmpty.map(v => v.toLowerCase());
  const hasDuplicate = new Set(lower).size !== lower.length;

  const btn = document.getElementById('saveEmailBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    const res = await authorizedJsonp({
      action: 'saveNotifyEmails',
      code,
      emails: JSON.stringify(emails),
      enabled: JSON.stringify(enabled)
    });
    if (res.ok) {
      showEmailMsg(
        `${res.name} さんの通知先メールを保存しました。` + (hasDuplicate ? '（同じアドレスが複数あるため、送信時は1通にまとめられます）' : ''),
        'success'
      );
    } else {
      showEmailMsg(res.message || '保存に失敗しました。', 'error');
    }
  } catch (e) {
    showEmailMsg('通信エラーが発生しました。もう一度お試しください。', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '通知先メールを保存する';
  }
}

// ===================================================================
// ポイント手動付与
// ===================================================================
const pointsStudentCodeEl = document.getElementById('pointsStudentCode');
const pointsStudentInfoEl = document.getElementById('pointsStudentInfo');
const pointsStudentNameEl = document.getElementById('pointsStudentName');
const pointsCurrentTotalEl = document.getElementById('pointsCurrentTotal');
const pointsValueEl = document.getElementById('pointsValue');
const pointsReasonEl = document.getElementById('pointsReason');
const pointsMsgEl = document.getElementById('pointsMsg');
const pointsHistoryListEl = document.getElementById('pointsHistoryList');

let pointsLookupTimer = null;
let pointsLookupSeq = 0;
pointsStudentCodeEl.addEventListener('input', () => {
  clearTimeout(pointsLookupTimer);
  const code = pointsStudentCodeEl.value.trim();
  pointsStudentInfoEl.classList.remove('show');
  pointsHistoryListEl.innerHTML = '';
  if (!code) return;

  const seq = ++pointsLookupSeq;
  pointsLookupTimer = setTimeout(() => loadPointsHistory(code, seq), 400);
});

async function loadPointsHistory(code, seq) {
  try {
    const res = await authorizedJsonp({ action: 'getPointsHistory', code });
    if (seq !== undefined && seq !== pointsLookupSeq) return; // 古いリクエストの結果は無視
    if (res.ok) {
      pointsStudentNameEl.textContent = res.name || '(氏名なし)';
      pointsCurrentTotalEl.textContent = '現在のポイント: ' + res.totalPoints + 'pt';
      pointsHistoryListEl.innerHTML = '';
      if (res.history.length === 0) {
        pointsHistoryListEl.innerHTML = '<div class="history-item"><span>まだ履歴がありません</span></div>';
      } else {
        res.history.forEach(h => {
          const item = document.createElement('div');
          item.className = 'history-item';
          const sign = h.points > 0 ? '+' : '';
          item.innerHTML = `<span>${h.date} ${h.reason || ''}</span><span>${sign}${h.points}pt</span>`;
          pointsHistoryListEl.appendChild(item);
        });
      }
    } else {
      pointsStudentNameEl.textContent = res.message;
      pointsCurrentTotalEl.textContent = '';
    }
    pointsStudentInfoEl.classList.add('show');
  } catch (e) {
    // 通信中は何もしない
  }
}

function showPointsMsg(text, type) {
  pointsMsgEl.textContent = text;
  pointsMsgEl.className = 'msg ' + type;
}

async function addPoints() {
  const code = pointsStudentCodeEl.value.trim();
  const points = pointsValueEl.value.trim();
  const reason = pointsReasonEl.value.trim();

  if (!code || !points) {
    showPointsMsg('生徒・講師番号とポイント数を入力してください。', 'error');
    return;
  }

  const btn = document.getElementById('savePointsBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';

  try {
    const res = await authorizedJsonp({ action: 'addPoints', code, points, reason });
    if (res.ok) {
      showPointsMsg(`${res.name} さんに付与しました。現在: ${res.totalPoints}pt`, 'success');
      pointsCurrentTotalEl.textContent = '現在のポイント: ' + res.totalPoints + 'pt';
      pointsValueEl.value = '';
      pointsReasonEl.value = '';
      loadPointsHistory(code);
    } else {
      showPointsMsg(res.message || '付与に失敗しました。', 'error');
    }
  } catch (e) {
    showPointsMsg('通信エラーが発生しました。もう一度お試しください。', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⭐ ポイントを付与する';
  }
}

// ===================================================================
// 講師勤怠CSV出力
// ===================================================================
let teacherListLoaded = false;

async function loadTeacherList() {
  const listEl = document.getElementById('teacherCheckList');
  listEl.innerHTML = '<div class="hint">読み込み中...</div>';

  try {
    const res = await authorizedJsonp({ action: 'getTeacherList' });
    if (res.ok) {
      if (res.teachers.length === 0) {
        listEl.innerHTML = '<div class="hint">講師データが見つかりませんでした。</div>';
        return;
      }
      listEl.innerHTML = res.teachers.map(t => `
        <label style="display:flex; align-items:center; gap:8px; padding:6px 0; font-weight:normal; font-size:14px;">
          <input type="checkbox" class="teacher-check" value="${t.code}" style="width:18px; height:18px;">
          ${t.code} ${t.name}
        </label>
      `).join('');
      teacherListLoaded = true;
    } else {
      listEl.innerHTML = '<div class="hint">' + (res.message || '読み込みに失敗しました') + '</div>';
    }
  } catch (e) {
    listEl.innerHTML = '<div class="hint">通信エラーが発生しました。</div>';
  }
}

function toggleAllTeachers(checked) {
  document.querySelectorAll('.teacher-check').forEach(el => el.checked = checked);
}

function showCsvMsg(text, type) {
  const el = document.getElementById('csvMsg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function exportAttendanceCsv() {
  const startDate = document.getElementById('csvStartDate').value;
  const endDate = document.getElementById('csvEndDate').value;

  if (!startDate || !endDate) {
    showCsvMsg('開始日と終了日を指定してください。', 'error');
    return;
  }

  const codes = Array.from(document.querySelectorAll('.teacher-check:checked')).map(el => el.value);

  const btn = document.getElementById('csvExportBtn');
  btn.disabled = true;
  btn.textContent = '出力中...';

  try {
    const auth = await requireStudentQrAuth();
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'exportAttendanceCsv',
        startDate,
        endDate,
        codes,
        staffLoginId: auth.loginId,
        sessionToken: auth.sessionToken
      })
    });
    const data = await res.json();

    if (data.ok) {
      const blob = new Blob([data.csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `attendance_details_${startDate.replace(/-/g, '')}-${endDate.replace(/-/g, '')}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showCsvMsg(`${data.count}名分のCSVをダウンロードしました。`, 'success');
    } else {
      showCsvMsg(data.message || '出力に失敗しました。', 'error');
    }
  } catch (e) {
    showCsvMsg('通信エラーが発生しました。もう一度お試しください。', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 CSVを出力する';
  }
}
