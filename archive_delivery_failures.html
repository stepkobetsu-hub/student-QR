<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>不達メール アーカイブ管理</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f3f6fa}*{box-sizing:border-box}body{margin:0}.wrap{max-width:1180px;margin:auto;padding:18px}.head,.card{background:#fff;border-radius:16px;box-shadow:0 5px 22px #18314d14;padding:18px;margin-bottom:14px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{font-size:1.4rem;margin:0}.btn,.back{border:0;border-radius:10px;padding:10px 13px;cursor:pointer;text-decoration:none;background:#e8eef6;color:#18314d}.btn.primary{background:#1769aa;color:#fff}.btn.danger{background:#b42318;color:#fff}.filters{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:10px}.filters input,.filters select{width:100%;padding:10px;border:1px solid #ccd6e0;border-radius:9px}.tableWrap{overflow:auto}table{border-collapse:collapse;width:100%;min-width:920px}th,td{padding:10px;border-bottom:1px solid #e4e9ef;text-align:left;vertical-align:top;font-size:.9rem}th{background:#f7f9fc}.badge{display:inline-block;padding:3px 8px;border-radius:20px;background:#5b6472;color:#fff}.actions{display:flex;gap:7px;flex-wrap:wrap}.msg{padding:10px;margin:10px 0;border-radius:8px;background:#eaf5ff}.error{background:#fff0f0;color:#a00}.empty{text-align:center;padding:30px;color:#687588}.permissionNote{font-size:.82rem;color:#687588;margin-top:10px}dialog{border:0;border-radius:15px;max-width:760px;width:calc(100% - 28px);max-height:88vh;overflow:auto;padding:22px}dialog::backdrop{background:#10182899}.dangerTitle{color:#b42318;margin-top:0}.modalActions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-top:20px}.detailGrid{display:grid;grid-template-columns:150px 1fr;gap:8px}.raw{white-space:pre-wrap;overflow-wrap:anywhere;background:#101828;color:#e7edf6;padding:12px;border-radius:9px}.mobileCards{display:none}.archiveCard{background:#fff;border:1px solid #9aa4b2;border-radius:14px;padding:14px;margin-bottom:12px}.archiveCard dl{display:grid;grid-template-columns:100px 1fr;gap:7px}.archiveCard dt{font-weight:700}.archiveCard dd{margin:0;overflow-wrap:anywhere}.archiveCard .actions{display:grid;grid-template-columns:1fr 1fr}.archiveCard .btn{min-width:100px;white-space:nowrap}
@media(max-width:760px){.wrap{padding:9px}.head{align-items:flex-start;flex-direction:column}.filters{grid-template-columns:1fr 1fr}.filters .wide{grid-column:1/-1}.tableWrap{display:none}.mobileCards{display:block}.detailGrid{grid-template-columns:1fr}}
</style></head><body><main class="wrap">
<section class="head"><div><h1>非表示データの管理</h1><div id="staff"></div></div><div class="actions"><a class="back" href="https://stepkobetsu-hub.github.io/student-QR/delivery_failures.html">閉じる（不達メール管理へ戻る）</a><button class="back" type="button" onclick="logoutDeliveryApp()">ログアウト</button></div></section>
<section class="card"><div class="filters"><input id="email" placeholder="メールアドレス検索"><input id="student" placeholder="生徒番号・氏名検索"><input id="school" placeholder="校舎検索"><label>送信元<select id="source"><option value="">すべて</option><option value="QR_ATTENDANCE">出退くんQR</option><option value="STEP_MESSAGE_CENTER">STEP配信</option></select></label><select id="state"><option value="">全状態</option><option>一時エラー</option><option>恒久不達</option><option>ブロック</option><option>無効アドレス</option><option>迷惑メール報告</option><option>送信エラー</option></select><button class="btn primary" onclick="loadItems()">検索・更新</button></div><div id="permissionNote" class="permissionNote"></div><div id="message"></div></section>
<section class="card tableWrap"><table><thead><tr><th>メールアドレス</th><th>発生時刻</th><th>生徒氏名</th><th>校舎</th><th>送信元</th><th>メール区分</th><th>状態</th><th>非表示情報</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></section><section id="cards" class="mobileCards"></section>
</main><dialog id="detail"><button class="back" onclick="detail.close()">閉じる</button><h2>不達メール詳細</h2><div id="detailBody"></div></dialog><dialog id="deleteConfirm"><h2 class="dangerTitle">完全削除の確認</h2><p>この不達記録を完全に削除します。<br>削除後は元に戻せません。<br>本当に削除してよろしいですか？</p><div class="modalActions"><button class="btn" onclick="cancelPermanentDelete()">キャンセル</button><button class="btn danger" onclick="executePermanentDelete()">削除する</button></div></dialog>
<script>
const API='https://script.google.com/macros/s/AKfycbw8L36Fj8SKtvNHQBi41FMqAPvDLGAdu1bbLxvd-78A8dFUOkWGnYRE-8PRNq7QZOl70w/exec';const AUTH_KEY='stepStaffAppAuth',CODE_KEY='stepStaffAppCode',SESSION_PASSWORD_KEY='deliveryFailuresPassword',DELIVERY_APP_URL='https://stepkobetsu-hub.github.io/student-QR/delivery_failures.html',STAFF_APP_URL='https://stepkobetsu-hub.github.io/seiseki-kanri/';let auth=null,staffPassword='',items=[],staffLevel='',pendingDeleteId='';const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
document.addEventListener('DOMContentLoaded',()=>{try{auth=JSON.parse(localStorage.getItem(AUTH_KEY)||'null')}catch(e){}staffPassword=sessionStorage.getItem(SESSION_PASSWORD_KEY)||'';if(!auth?.code){location.replace(STAFF_APP_URL);return}if(!staffPassword){location.replace(DELIVERY_APP_URL);return}$('staff').textContent=(auth.name||auth.code)+' さん';$('source').addEventListener('change',loadItems);loadItems()});
function logoutDeliveryApp(){sessionStorage.removeItem(SESSION_PASSWORD_KEY);localStorage.removeItem(AUTH_KEY);localStorage.removeItem(CODE_KEY);auth=null;items=[];location.replace(STAFF_APP_URL)}
async function api(data){let res;try{res=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({},data,{staffCode:auth.code,staffPassword})),redirect:'follow'})}catch(e){throw new Error('認証サーバーに接続できません。通信状況を確認してください。')}let out;try{out=await res.json()}catch(e){throw new Error('認証サーバーから正しい応答を受け取れませんでした。')}if(!res.ok)throw new Error('認証サーバーでエラーが発生しました。');if(!out.ok){const m=String(out.message||'');if(/パスワード|認証/.test(m))throw new Error('保存済みログイン情報が無効です。再ログインしてください。');if(/権限/.test(m))throw new Error('このアカウントには利用権限がありません。');throw new Error(m||'処理に失敗しました。')}return out}
function msg(text,error){$('message').className='msg'+(error?' error':'');$('message').textContent=text||''}function normalizeSource(v){return String(v||'').trim().toUpperCase()}function sourceLabel(v){v=normalizeSource(v);return v==='STEP_MESSAGE_CENTER'?'STEP配信':v==='QR_ATTENDANCE'?'出退くんQR':'その他'}function mailType(x){return normalizeSource(x.sourceSystem)==='STEP_MESSAGE_CENTER'?(x.subject||x.fields||x.mailType||'STEP配信'):(x.mailType||((x.tags||'').includes('checkout')?'退室':'入室'))}const fmt=v=>v?new Date(v).toLocaleString('ja-JP'):'-';
async function loadItems(){try{msg('読み込み中…');const r=await api({action:'deliveryFailuresList',archiveOnly:true,includeArchived:true,emailSearch:$('email').value,studentSearch:$('student').value,school:$('school').value,sourceSystem:$('source').value,state:$('state').value});items=Array.isArray(r.items)?r.items:[];staffLevel=String(r.staff?.level||'');render();msg('')}catch(e){items=[];render();if(/保存済みログイン情報が無効/.test(e.message)){sessionStorage.removeItem(SESSION_PASSWORD_KEY);msg(e.message,true);setTimeout(()=>location.replace(DELIVERY_APP_URL),1200)}else{msg('非表示データを取得できませんでした。認証状態または通信状況を確認してください。 '+e.message,true)}}}
function canPermanentlyDelete(){return ['2','3','4'].includes(staffLevel)}
function buttons(x){return `<div class="actions"><button class="btn primary" onclick="unarchiveItem('${x.id}')">復元</button>${canPermanentlyDelete()?`<button class="btn danger" onclick="openPermanentDelete('${x.id}')">完全削除</button>`:''}<button class="btn" onclick="showDetail('${x.id}')">詳細</button></div>`}
function render(){const rows=items.map(x=>`<tr><td>${esc(x.email)}</td><td>${fmt(x.occurredAt)}</td><td>${esc(x.studentNames||'-')}</td><td>${esc(x.school||'-')}</td><td>${esc(sourceLabel(x.sourceSystem))}</td><td>${esc(mailType(x))}</td><td>${esc(x.state)}<br>${esc(x.confirmStatus)}</td><td><span class="badge">アーカイブ済み</span><br>${fmt(x.archivedAt)}<br>${esc(x.archivedBy||'-')}</td><td>${buttons(x)}</td></tr>`).join('');$('rows').innerHTML=rows||'<tr><td colspan="9" class="empty">非表示データはありません</td></tr>';$('cards').innerHTML=items.length?items.map(x=>`<article class="archiveCard"><dl><dt>メール</dt><dd>${esc(x.email)}</dd><dt>送信元</dt><dd>${esc(sourceLabel(x.sourceSystem))}</dd><dt>メール区分</dt><dd>${esc(mailType(x))}</dd><dt>状態</dt><dd>${esc(x.state)}・${esc(x.confirmStatus)}</dd><dt>非表示日時</dt><dd>${fmt(x.archivedAt)}</dd><dt>実行者</dt><dd>${esc(x.archivedBy||'-')}</dd></dl>${buttons(x)}</article>`).join(''):'<div class="card empty">非表示データはありません</div>';$('permissionNote').textContent=canPermanentlyDelete()?'':'完全削除はAK=2以上の管理者のみ操作できます'}
async function unarchiveItem(id){if(!confirm('この不達記録を通常一覧へ復元します。よろしいですか？'))return;try{await api({action:'deliveryFailureUnarchive',id});await loadItems();msg('通常一覧へ復元しました')}catch(e){msg('復元できませんでした：'+e.message,true)}}
function openPermanentDelete(id){if(!canPermanentlyDelete()){msg('完全削除はAK=2以上の管理者のみ操作できます',true);return}pendingDeleteId=id;$('deleteConfirm').showModal()}
function cancelPermanentDelete(){pendingDeleteId='';$('deleteConfirm').close()}
async function executePermanentDelete(){const id=pendingDeleteId;if(!id)return;pendingDeleteId='';$('deleteConfirm').close();try{await api({action:'deliveryFailureDeletePermanent',id});await loadItems();msg('完全に削除しました')}catch(e){msg('削除できませんでした：'+e.message,true)}}
async function showDetail(id){try{const r=await api({action:'deliveryFailureDetail',id}),x=r.item;let raw=x.rawJson;try{raw=JSON.stringify(JSON.parse(raw),null,2)}catch(e){}$('detailBody').innerHTML=`<div class="detailGrid"><b>メール</b><div>${esc(x.email)}</div><b>状態</b><div>${esc(x.state)} / アーカイブ済み</div><b>件名</b><div>${esc(x.subject||'-')}</div><b>理由</b><div>${esc(x.reason||'-')}</div><b>Message ID</b><div>${esc(x.messageId)}</div><b>アーカイブ</b><div>${fmt(x.archivedAt)} / ${esc(x.archivedBy||'-')}</div></div><h3>Brevo元イベント</h3><div class="raw">${esc(raw)}</div>`;$('detail').showModal()}catch(e){msg(e.message,true)}}
</script></body></html>
